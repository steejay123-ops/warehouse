<div id="change-password-screen" class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, rgb(15, 23, 42) 0%, rgb(30, 27, 75) 40%, rgb(49, 46, 129) 70%, rgb(30, 27, 75) 100%);">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-900/20 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">
    <div class="bg-slate-900/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/10 overflow-hidden">
      <div class="h-1 bg-gradient-to-l from-rose-400 via-orange-500 to-amber-400"></div>

      <div class="p-8">
        <div class="flex flex-col items-center mb-8">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4 shadow-xl" style="background:linear-gradient(135deg,#f43f5e,#f97316)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
            </svg>
          </div>
          <h1 class="text-xl font-black text-white text-center leading-tight">
            {{ isMandatory ? 'تغییر رمز عبور اجباری' : 'تغییر رمز عبور' }}
          </h1>
          <p class="text-xs text-slate-400 mt-1.5 text-center">
            {{ isMandatory ? 'برای ادامه کار باید رمز عبور پیش‌فرض خود را تغییر دهید' : 'لطفاً رمز عبور جدید خود را وارد کنید' }}
          </p>
        </div>

        <div *ngIf="errorMessage" class="mb-4 p-3 rounded-xl text-xs flex items-center gap-2.5" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1.5">رمز عبور فعلی</label>
            <div class="relative">
              <input [type]="oldPasswordFieldType" [(ngModel)]="oldPassword" placeholder="••••••••" class="w-full pr-10 pl-4 py-2.5 rounded-xl text-sm bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 transition-all">
              <button type="button" (click)="toggleOldPassword()" class="absolute inset-y-0 right-0 flex items-center px-3 cursor-pointer text-slate-400 hover:text-white transition-colors focus:outline-none z-10">
                <svg *ngIf="oldPasswordFieldType === 'password'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="oldPasswordFieldType === 'text'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1.5">رمز عبور جدید</label>
            <div class="relative">
              <input [type]="newPasswordFieldType" [(ngModel)]="newPassword" placeholder="••••••••" class="w-full pr-10 pl-4 py-2.5 rounded-xl text-sm bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 transition-all">
              <button type="button" (click)="toggleNewPassword()" class="absolute inset-y-0 right-0 flex items-center px-3 cursor-pointer text-slate-400 hover:text-white transition-colors focus:outline-none z-10">
                <svg *ngIf="newPasswordFieldType === 'password'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="newPasswordFieldType === 'text'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-slate-300 mb-1.5">تکرار رمز عبور جدید</label>
            <div class="relative">
              <input [type]="confirmPasswordFieldType" [(ngModel)]="confirmPassword" placeholder="••••••••" class="w-full pr-10 pl-4 py-2.5 rounded-xl text-sm bg-slate-800 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 transition-all">
              <button type="button" (click)="toggleConfirmPassword()" class="absolute inset-y-0 right-0 flex items-center px-3 cursor-pointer text-slate-400 hover:text-white transition-colors focus:outline-none z-10">
                <svg *ngIf="confirmPasswordFieldType === 'password'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="confirmPasswordFieldType === 'text'" class="pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <button [disabled]="isSubmitting" (click)="handleChangePassword()" class="w-full py-3 rounded-xl text-sm font-bold text-white transition-all active:scale-[.98] mt-4 flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#f43f5e,#f97316);box-shadow:0 8px 25px rgba(249,115,22,.4)" [style.opacity]="isSubmitting ? '0.85' : '1'">
            <span *ngIf="!isSubmitting">تایید و تغییر رمز</span>
            <span *ngIf="isSubmitting">در حال پردازش...</span>
            <svg *ngIf="!isSubmitting" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
            <svg *ngIf="isSubmitting" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </button>

          <button *ngIf="isMandatory" [disabled]="isSubmitting" (click)="logout()" class="w-full py-2.5 mt-2 rounded-xl text-xs font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all text-center">
            خروج از حساب کاربری
          </button>
          <button *ngIf="!isMandatory" [disabled]="isSubmitting" (click)="goBack()" class="w-full py-2.5 mt-2 rounded-xl text-xs font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all text-center">
            انصراف و بازگشت به داشبورد
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
