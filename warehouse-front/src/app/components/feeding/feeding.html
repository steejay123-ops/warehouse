<div class="space-y-6 fade-in text-right" dir="rtl">
    
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
      <div>
        <h3 class="font-black text-slate-800 text-base flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          تغذیه اطلاعات (Data Feeding)
        </h3>
        <p class="text-[11px] text-slate-500 mt-1">انبار فعال: <span class="font-bold text-slate-700">{{activeWh.name}}</span> | بارگذاری فایل اکسل کالاهای انبار</p>
      </div>
    </div>

    <!-- Upload Section -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 flex flex-col items-center justify-center min-h-[300px]">
      
      <div class="w-full max-w-md text-center">
        <!-- Input file wrapper -->
        <div class="relative border-2 border-dashed border-slate-300 rounded-xl p-8 hover:border-indigo-500 transition-colors bg-slate-50 group">
          <input 
            type="file" 
            accept=".xlsx, .xls"
            (change)="onFileSelected($event)"
            [disabled]="isUploading"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
          >
          
          <div class="flex flex-col items-center gap-3">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-indigo-400 group-hover:text-indigo-600 transition-colors">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="12" y1="18" x2="12" y2="12"></line>
              <line x1="9" y1="15" x2="15" y2="15"></line>
            </svg>
            <h4 class="font-bold text-slate-700">آپلود فایل اکسل (XLSX)</h4>
            <p class="text-xs text-slate-500">فایل را اینجا رها کنید یا کلیک کنید</p>
          </div>
        </div>

        <!-- Selected File Info -->
        <div *ngIf="selectedFile" class="mt-4 p-3 bg-indigo-50 border border-indigo-100 rounded-lg flex items-center justify-between text-right">
          <div class="flex items-center gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-indigo-600"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            <div>
              <p class="text-xs font-bold text-slate-800" dir="ltr">{{ selectedFile.name }}</p>
              <p class="text-[10px] text-slate-500">{{ (selectedFile.size / 1024).toFixed(1) }} KB</p>
            </div>
          </div>
          <button (click)="selectedFile = null" class="text-slate-400 hover:text-red-500 relative z-20">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>

        <!-- Submit Button -->
        <button 
          (click)="uploadExcel()" 
          [disabled]="!selectedFile || isUploading"
          class="mt-6 w-full py-3 rounded-xl font-bold text-sm transition-all shadow-md flex justify-center items-center gap-2 relative z-20"
          [ngClass]="(!selectedFile || isUploading) ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white active:scale-95'">
          
          <svg *ngIf="isUploading" class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          
          <span *ngIf="!isUploading">شروع پردازش اطلاعات</span>
          <span *ngIf="isUploading">در حال پردازش...</span>
        </button>

      </div>
    </div>
</div>
