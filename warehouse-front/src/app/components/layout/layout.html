<div id="app-screen" class="min-h-screen flex-col md:flex-row flex">
  <div *ngIf="isSidebarOpen" class="fixed inset-0 bg-slate-900/60 z-40 md:hidden" (click)="closeSidebar()"></div>

  <aside id="sidebar" [class.translate-x-0]="isSidebarOpen" [class.translate-x-full]="!isSidebarOpen" class="fixed md:static inset-y-0 right-0 w-72 bg-slate-900 flex flex-col z-50 transition-transform duration-300 md:translate-x-0" style="min-height:100vh">
    <div class="p-5 border-b border-slate-800 flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
          <path d="M4 10L16 4L28 10V22L16 28L4 22V10Z" stroke="white" stroke-width="1.5" fill="none"></path>
          <circle cx="16" cy="16" r="2.5" fill="white"></circle>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <h2 class="font-black text-white text-sm">اتوماسیون انبار</h2>
        <span class="text-[10px] text-slate-500">نسخه ۱.۰ · شیراز</span>
      </div>
      <button (click)="closeSidebar()" class="md:hidden p-1 text-slate-400 hover:text-white transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="px-4 py-2.5 border-b border-slate-800/60 flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span>
      <span class="text-[10px] text-slate-500">واحد جاری:</span>
      <span class="text-[10px] font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded-full">{{userRole}}</span>
    </div>

    <nav class="flex-1 p-3 overflow-y-auto flex flex-col" id="sidebar-nav">
      
      <div *ngIf="store.isWarehouseContext()" class="mb-4 pb-4 border-b border-slate-800/60 shrink-0">
        <button (click)="exitWarehouseMode()" class="w-full py-2.5 px-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 bg-slate-800 text-slate-200 hover:text-white hover:bg-slate-700 shadow-sm border border-slate-700">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          بازگشت به سطح کلان سیستم
        </button>
      </div>

      <div class="space-y-0.5 shrink-0">
        <button *ngFor="let item of navItems()" (click)="switchTab(item.id)" [class.active]="currentTab === item.id" [ngClass]="item.isPending ? 'text-slate-600 hover:text-slate-400 hover:bg-slate-800/40 opacity-50' : 'text-slate-400 hover:text-white hover:bg-slate-800/80'" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-semibold transition-all group">
          <span class="shrink-0" [innerHTML]="icons[item.icon]"></span>
          <span>{{item.label}} <span *ngIf="item.isPending" class='text-[9px] bg-slate-800 text-slate-400 px-1 py-0.5 rounded mr-1' style='font-size:8px;'>بزودی</span></span>
        </button>
      </div>

      <div *ngIf="store.isWarehouseContext()" class="mt-6 pt-4 border-t border-slate-800/60 flex flex-col gap-3 shrink-0">
        <!-- Warehouse Card (Clickable to change warehouse) -->
        <button (click)="exitWarehouseMode(true)" class="w-full bg-slate-800/50 hover:bg-slate-700/60 transition-all rounded-2xl p-4 border border-slate-700/60 hover:border-slate-500/60 flex flex-col items-center justify-center text-center shadow-inner relative overflow-hidden group cursor-pointer">
          <div class="absolute inset-0 opacity-10 group-hover:opacity-20 transition-opacity" [style.background]="currentWarehouse?.color || '#4f46e5'"></div>
          
          <!-- Hover Overlay Icon -->
          <div class="absolute inset-0 z-20 bg-slate-900/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
             <div class="flex flex-col items-center gap-2">
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
               <span class="text-white text-xs font-bold">تغییر انبار</span>
             </div>
          </div>
          
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-2xl mb-3 shadow-md relative z-10 transition-transform group-hover:scale-105" [style.background]="currentWarehouse?.color || '#4f46e5'">
            {{(currentWarehouse?.code || '').slice(-2)}}
          </div>
          <div class="font-black text-slate-100 text-[13px] w-full truncate px-1 relative z-10">{{currentWarehouse?.name}}</div>
          <div class="text-[10px] font-bold mt-1.5 w-full truncate px-1 relative z-10 flex items-center justify-center gap-1" [style.color]="currentWarehouse?.color || '#a5b4fc'">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            {{currentWarehouse?.location || 'بدون لوکیشن'}}
          </div>
        </button>
      </div>

    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
    
    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 p-4 h-[70px] flex items-center justify-between shadow-sm relative z-10 transition-all" [style.borderTop]="store.isWarehouseContext() ? '4px solid ' + (currentWarehouse?.color || '#4f46e5') : ''">
      
      <!-- Right Side (RTL Start): Mobile Toggle, User, Notifications, Progress -->
      <div class="flex items-center gap-2 md:gap-4 flex-1 justify-start shrink-0">
        <button (click)="openSidebar()" class="md:hidden p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <div class="relative">
          <div *ngIf="isUserMenuOpen" class="fixed inset-0 z-40" (click)="closeUserMenu()"></div>
          <button (click)="toggleUserMenu()" class="relative z-50 flex items-center gap-2 hover:bg-slate-100 p-1.5 pr-2 rounded-xl transition-colors border border-transparent hover:border-slate-200">
            <span class="text-[11px] font-bold text-slate-700 hidden sm:block mr-1">{{userName}}</span>
            <div class="w-8 h-8 rounded-full flex items-center justify-center font-black text-xs text-white shrink-0 shadow-sm" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">{{userAvatar}}</div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400 hidden sm:block"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          
          <div *ngIf="isUserMenuOpen" class="absolute right-0 top-full mt-1 w-56 bg-white border border-slate-200 rounded-2xl shadow-xl z-50 overflow-hidden fade-in">
            <div class="p-3 border-b border-slate-100 bg-slate-50">
              <p class="text-xs font-bold text-slate-800 truncate mb-0.5">{{userName}}</p>
              <p class="text-[10px] font-semibold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md inline-block truncate max-w-full">{{userRole}}</p>
            </div>
            <div class="p-2 flex flex-col">
              <button (click)="goToChangePassword(); closeUserMenu()" class="w-full text-right py-2.5 px-3 rounded-xl text-xs font-semibold transition-all flex items-center gap-2.5 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <span>تغییر رمز ورود</span>
              </button>
              <button (click)="logout(); closeUserMenu()" class="w-full text-right py-2.5 px-3 rounded-xl text-xs font-semibold transition-all flex items-center gap-2.5 text-rose-500 hover:bg-rose-50 mt-1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                <span>خروج از حساب</span>
              </button>
            </div>
          </div>
        </div>
        
        <button class="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors shrink-0">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border border-white"></span>
        </button>
        
        <div class="hidden lg:flex items-center gap-2 border-r border-slate-200 pr-4" *ngIf="!['counter', 'customs', 'supervisor'].includes(store.currentTab())" [title]="progressStats.tooltip">
          <span class="text-xs text-slate-400 shrink-0">{{progressStats.label}}</span>
          <div class="w-20 bg-slate-200 h-1.5 rounded-full overflow-hidden shrink-0">
            <div class="h-full rounded-full transition-all duration-500" [ngClass]="progressStats.colorClass" [style.width.%]="progressStats.percent"></div>
          </div>
          <span class="text-xs font-bold text-slate-700 shrink-0">{{progressStats.percent}}٪</span>
        </div>
      </div>

      <!-- Center: Page Title -->
      <div class="flex-1 flex justify-center min-w-0 shrink-0">
        <h1 class="text-sm font-bold text-slate-800 truncate">{{currentTitle}}</h1>
      </div>
      
      <!-- Left Side (RTL End): Badge -->
      <div class="flex items-center gap-3 flex-1 min-w-0 justify-end">
        <div *ngIf="store.isWarehouseContext()" class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-xl shadow-md transition-all shrink-0" [style.background]="currentWarehouse?.color || '#4f46e5'">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
           <span class="text-[12px] font-black text-white shrink-0">{{currentWarehouse?.name}}</span>
        </div>
      </div>
    </header>
    
    <div *ngIf="store.isWarehouseContext()" class="p-3 block sm:hidden flex items-center justify-center gap-2 shadow-inner border-b" [style.background]="currentWarehouse?.color || '#4f46e5'" [style.borderColor]="'rgba(0,0,0,0.1)'">
       <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
       <span class="text-[12px] font-black text-white shrink-0">{{currentWarehouse?.name}}</span>
    </div>

    <div class="flex-1 p-4 md:p-6 overflow-y-auto bg-slate-50 fade-in relative" id="content-container">
      
      <!-- Breadcrumbs -->
      <div *ngIf="store.isWarehouseContext()" class="mb-5 flex items-center gap-1.5 text-[11px] font-bold text-slate-400 select-none">
        <span class="hover:text-slate-600 cursor-pointer transition-colors" (click)="exitWarehouseMode()">انبارها</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span [style.color]="currentWarehouse?.color || '#4f46e5'">{{currentWarehouse?.name}}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        <span class="text-slate-600">{{currentTitle}}</span>
      </div>

      <router-outlet></router-outlet>
    </div>
  </div>
</div>
